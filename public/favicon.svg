<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="50%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#06B6D4"/>
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#22D3EE"/>
      <stop offset="50%" stop-color="#A855F7"/>
      <stop offset="100%" stop-color="#3B82F6"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="0.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#0A0A0F"/>
  
  <!-- Outer glow ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="url(#neonGrad)" stroke-width="0.5" opacity="0.4" filter="url(#softGlow)"/>
  
  <!-- Inner subtle ring -->
  <circle cx="16" cy="16" r="13" fill="none" stroke="url(#neonGrad)" stroke-width="0.3" opacity="0.2"/>
  
  <!-- AM Text -->
  <text x="16" y="20.5" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="11" 
        font-weight="800" 
        text-anchor="middle" 
        fill="url(#textGrad)"
        filter="url(#glow)"
        letter-spacing="-0.5">AM</text>
  
  <!-- Subtle highlight -->
  <circle cx="16" cy="16" r="14" fill="none" stroke="url(#textGrad)" stroke-width="0.5" opacity="0.15"/>
</svg>